<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Secciones — Gestión Académica</title>
  <link rel="stylesheet" href="css/styles.css"/>
  <link rel="stylesheet" href="css/inicio.css"/>
  <link rel="stylesheet" href="css/secciones.css"/>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main-content">
    <div class="breadcrumb">
      <a onclick="window.location.href='inicio.html'">Cursos</a>
      <span class="breadcrumb-sep">›</span>
      <span id="breadcrumb-course">Curso</span>
    </div>
    <div class="page-header">
      <div>
        <h1 class="page-title" id="course-title">Cargando...</h1>
        <p class="page-subtitle" id="course-schedule"></p>
      </div>
      <button class="btn btn-primary" onclick="openSectionModal()">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><line x1="8" y1="2" x2="8" y2="14"/><line x1="2" y1="8" x2="14" y2="8"/></svg>
        Agregar sección
      </button>
    </div>

    <!-- Filtro por grado -->
    <div class="grade-filter-bar" id="grade-filter-bar">
      <span style="font-size:12px;font-weight:500;color:var(--text-muted);text-transform:uppercase;letter-spacing:.4px">Grado:</span>
    </div>

    <div id="empty-state" class="empty-state" style="display:none">
      <div class="empty-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
      </div>
      <div class="empty-title">Sin secciones</div>
      <div class="empty-text">Agrega una sección para comenzar a gestionar alumnos y notas.</div>
    </div>

    <div class="cards-grid" id="sections-grid"></div>
  </main>
</div>

<!-- MODAL: SECTION -->
<div class="modal-overlay" id="section-modal">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title" id="section-modal-title">Agregar sección</h2>
      <button class="modal-close" onclick="closeModal('section-modal')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><line x1="2" y1="2" x2="14" y2="14"/><line x1="14" y1="2" x2="2" y2="14"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Grado *</label>
          <select class="form-control" id="section-grade">
            <option value="">Seleccionar grado</option>
            <option value="1°">1°</option>
            <option value="2°">2°</option>
            <option value="3°">3°</option>
            <option value="4°">4°</option>
            <option value="5°">5°</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Letra de sección *</label>
          <select class="form-control" id="section-letter">
            <option value="">Seleccionar</option>
            <option value="A">A</option>
            <option value="B">B</option>
            <option value="C">C</option>
            <option value="D">D</option>
            <option value="E">E</option>
            <option value="F">F</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Días de clase</label>
        <div class="schedule-days" id="schedule-days"></div>
      </div>
      <div id="schedule-times"></div>
      <div class="form-group" style="margin-top:16px">
        <label class="form-label">Competencias por bimestre *</label>
        <div id="section-comp-hint" class="comp-required-hint">⚠ Selecciona al menos 1 competencia por bimestre.</div>
        <div id="section-bimestres-container"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('section-modal')">Cancelar</button>
      <button class="btn btn-primary" onclick="saveSection()">Guardar sección</button>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script src="js/secciones.js"></script>
</body>
</html>
