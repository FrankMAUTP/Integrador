<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — Admin</title>
  <link rel="stylesheet" href="css/styles.css"/>
  <link rel="stylesheet" href="css/admin.css"/>
</head>
<body>
<div class="admin-layout">
  <aside class="admin-sidebar" id="admin-sidebar"></aside>

  <main class="admin-main">
    <div class="admin-page-header">
      <h1 class="admin-page-title">Dashboard</h1>
      <p class="admin-page-sub">Resumen general del sistema</p>
    </div>

    <!-- Stat cards globales -->
    <div class="admin-stats-grid" id="stats-grid">
      <div class="admin-stat-card">
        <div class="admin-stat-icon si-blue">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
        </div>
        <div class="admin-stat-value" id="stat-cuentas">—</div>
        <div class="admin-stat-label">Cuentas docentes</div>
      </div>
      <div class="admin-stat-card">
        <div class="admin-stat-icon si-green">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
        </div>
        <div class="admin-stat-value" id="stat-cursos">—</div>
        <div class="admin-stat-label">Cursos totales</div>
      </div>
      <div class="admin-stat-card">
        <div class="admin-stat-icon si-purple">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        </div>
        <div class="admin-stat-value" id="stat-secciones">—</div>
        <div class="admin-stat-label">Secciones totales</div>
      </div>
      <div class="admin-stat-card">
        <div class="admin-stat-icon si-orange">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
        </div>
        <div class="admin-stat-value" id="stat-alumnos">—</div>
        <div class="admin-stat-label">Alumnos activos</div>
      </div>
    </div>

    <!-- Tabla por docente -->
    <div class="admin-section">
      <div class="admin-section-header">
        <span class="admin-section-title">Cuentas de docentes</span>
        <span id="dash-loading" style="font-size:12px;color:var(--text-muted)">Cargando...</span>
      </div>
      <div class="admin-table-wrap">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Docente</th>
              <th style="text-align:center">Cursos</th>
              <th style="text-align:center">Secciones</th>
              <th style="text-align:center">Alumnos</th>
              <th style="text-align:center">Estado</th>
              <th>Registrado</th>
            </tr>
          </thead>
          <tbody id="dash-tbody">
            <tr><td colspan="6" style="text-align:center;padding:32px;color:var(--text-muted)">Cargando...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<script src="js/app.js"></script>
<script src="js/admin.js"></script>
<script src="js/admin-dashboard.js"></script>
</body>
</html>
