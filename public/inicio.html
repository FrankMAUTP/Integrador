<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cursos — Gestión Académica</title>
  <link rel="stylesheet" href="css/styles.css"/>
  <link rel="stylesheet" href="css/inicio.css"/>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>

  <main class="main-content">
    <div class="content-with-panel">
      <div>
        <div class="page-header">
          <div>
            <h1 class="page-title">Cursos</h1>
            <p class="page-subtitle">Gestiona tus cursos</p>
          </div>
          <button class="btn btn-primary" id="btn-create-course" onclick="openCourseModal()">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><line x1="8" y1="2" x2="8" y2="14"/><line x1="2" y1="8" x2="14" y2="8"/></svg>
            Crear curso
          </button>
        </div>

        <div id="empty-state" class="empty-state" style="display:none">
          <div class="empty-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
          </div>
          <div class="empty-title">Sin cursos aún</div>
          <div class="empty-text">Crea tu primer curso haciendo clic en "Crear curso".</div>
        </div>

        <div class="cards-grid" id="courses-grid"></div>
      </div>

      <div class="notif-panel">
        <div class="notif-title">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" width="14" height="14"><path d="M8 1a5 5 0 015 5v3l1.5 2.5H1.5L3 9V6a5 5 0 015-5z"/><path d="M6.5 13.5a1.5 1.5 0 003 0"/></svg>
          Próximas evaluaciones
        </div>
        <div id="notif-list"><div class="notif-empty">No hay evaluaciones próximas</div></div>
      </div>
    </div>
  </main>
</div>

<!-- MODAL: CREATE/EDIT COURSE -->
<div class="modal-overlay" id="course-modal">
  <div class="modal modal-lg">
    <div class="modal-header">
      <h2 class="modal-title" id="course-modal-title">Crear curso</h2>
      <button class="modal-close" onclick="closeModal('course-modal')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><line x1="2" y1="2" x2="14" y2="14"/><line x1="14" y1="2" x2="2" y2="14"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <!-- Fila: nombre + color -->
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Nombre del curso *</label>
          <input type="text" class="form-control" id="course-name" placeholder="Ej: Matemáticas" oninput="this.value=this.value.replace(/[^a-zA-ZáéíóúüñÁÉÍÓÚÜÑ ]/g,'')" />
        </div>
        <div class="form-group">
          <label class="form-label">Color del curso</label>
          <div class="color-picker-row" id="color-picker"></div>
        </div>
      </div>

      <!-- Competencias -->
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <label class="form-label" style="margin:0">Competencias *</label>
        <span style="font-size:11.5px;color:var(--text-muted)">Mínimo 1 · Máximo 5</span>
      </div>
      <div id="comp-required-hint" class="comp-required-hint">⚠ Agrega al menos una competencia.</div>
      <div id="competencias-container"></div>
      <button class="btn btn-ghost btn-sm" id="btn-add-comp" onclick="addCompetencia()" style="margin-top:8px">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12"><line x1="8" y1="2" x2="8" y2="14"/><line x1="2" y1="8" x2="14" y2="8"/></svg>
        Agregar competencia
      </button>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('course-modal')">Cancelar</button>
      <button class="btn btn-primary" onclick="saveCourse()">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><polyline points="2 8 6 12 14 4"/></svg>
        Guardar curso
      </button>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script src="js/inicio.js"></script>
</body>
</html>
