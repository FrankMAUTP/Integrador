<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Alumnos — Gestión Académica</title>
  <link rel="stylesheet" href="css/styles.css"/>
  <link rel="stylesheet" href="css/alumnos.css"/>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>

  <main class="main-content">
    <div class="page-header">
      <div>
        <h1 class="page-title">Alumnos</h1>
        <p class="page-subtitle">Directorio general de estudiantes</p>
      </div>
    </div>

    <div class="filters-bar">
      <span class="filter-label">Filtros</span>
      <div class="filter-sep"></div>

      <div class="filter-group">
        <label class="filter-item-label">Curso</label>
        <select class="form-control filter-select" id="filter-course">
          <option value="">Todos</option>
        </select>
      </div>

      <div class="filter-group">
        <label class="filter-item-label">Sección</label>
        <select class="form-control filter-select" id="filter-section">
          <option value="">Todas</option>
        </select>
      </div>

      <div class="filter-group">
        <label class="filter-item-label">Grado</label>
        <select class="form-control filter-select" id="filter-grade">
          <option value="">Todos</option>
        </select>
      </div>

      <div class="filter-group">
        <label class="filter-item-label">Estado</label>
        <select class="form-control filter-select" id="filter-status">
          <option value="">Todos</option>
          <option value="activo">Activo</option>
          <option value="retirado">Retirado</option>
        </select>
      </div>

      <button class="btn btn-primary btn-sm" onclick="applyFilters()">Aplicar filtros</button>
    </div>

    <div class="actions-bar">
      <div class="search-input-wrapper">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8">
          <circle cx="6.5" cy="6.5" r="4.5"/><line x1="10" y1="10" x2="14" y2="14"/>
        </svg>
        <input type="text" class="search-input" id="search-input"
               placeholder="Buscar por nombre y presiona Enter…"
               oninput="this.value=this.value.replace(/[^a-zA-ZáéíóúüñÁÉÍÓÚÜÑ ]/g,'')" />
      </div>
      <div class="student-counter">
        <span class="counter-num" id="student-counter">0</span>
        alumnos encontrados
      </div>
    </div>

    <div class="table-wrapper">
      <table id="students-table">
        <thead>
          <tr>
            <th class="col-num">N°</th>
            <th>Nombres</th>
            <th>Curso</th>
            <th>Grado</th>
            <th>Sección</th>
            <th>Estado</th>
            <th class="col-actions"></th>
          </tr>
        </thead>
        <tbody id="students-tbody"></tbody>
      </table>
    </div>
  </main>
</div>

<script src="js/app.js"></script>
<script src="js/alumnos.js"></script>
</body>
</html>
